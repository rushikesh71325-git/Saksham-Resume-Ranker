ai_usage_summary: |
  Used AI assistants to design the architecture, implement feature extraction heuristics, 
  ensure the compute constraints were met by separating the logic into precompute/rank stages,
  and parse out the complex requirements of the job description.

methodology_summary: |
  Two-stage architecture to respect strict compute constraints. Stage 1 (offline precompute) streams 
  the 100K JSONL and applies strong heuristics to extract numerical representations for role alignment, 
  career substance (evidence of building retrieval systems), tech depth, behavioral availability, 
  and location fit. Honeypots (date inconsistencies, expert skills with 0 months) are flagged. 
  Stage 2 (ranking) runs in < 5 seconds on CPU: loads the optimized features, applies weighted 
  scoring, handles tie-breaks deterministically, and dynamically builds non-hallucinated reasoning 
  sentences by referencing exact profile facts.

